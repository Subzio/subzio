name: Update Proxy List

on:
  schedule:
    - cron: '12 */5 * * *'  # Every 5 hours
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    env:
      # Each line: owner/repo|local-path|file1,file2,...
      # Edit this list to add/remove repositories and their files.
      SOURCES: |
        igareck/vpn-configs-for-russia|vpn-configs-for-russia|WHITE-CIDR-RU-checked.txt,WHITE-SNI-RU-all.txt,Vless-Reality-White-Lists-Rus-Mobile.txt,Vless-Reality-White-Lists-Rus-Mobile-2.txt

    steps:
    - name: Checkout this repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true

    - name: Checkout and update all source repositories
      run: |
        mkdir -p input

        # Loop through each configured source line
        while IFS= read -r line || [ -n "$line" ]; do
          repo=$(echo "$line" | cut -d'|' -f1)
          path=$(echo "$line" | cut -d'|' -f2)
          files=$(echo "$line" | cut -d'|' -f3)

          if [ -z "$repo" ] || [ -z "$path" ]; then
            echo "Skipping invalid line: $line"
            continue
          fi

          if [ -d "$path" ]; then
            echo "Updating existing $path"
            cd "$path"
            git pull origin main || true
            cd - >/dev/null
          else
            echo "Cloning $repo into $path"
            git clone --depth 1 "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${repo}.git" "$path" || true
          fi

          # Copy listed files (comma-separated) to input/ if they exist
          IFS=',' read -ra filearr <<< "$files"
          for f in "${filearr[@]}"; do
            if [ -z "$f" ]; then
              continue
            fi
            src="$path/$f"
            if [ -f "$src" ]; then
              cp "$src" input/
              echo "Copied $src"
            else
              echo "Warning: $src not found"
            fi
          done

        done <<< "${{ env.SOURCES }}"

    - name: Process and filter files
      run: |
        # Clear output file if it exists
        > WHITE_LIST_PROXY_COLLECTION.txt

        # Process each file and filter content
        for file in input/*.txt; do
            echo "Processing $file..."
            awk '
            /xtls-rprx-vision-udp443/ { next }                          # Skip malformed generated links
            /xmux/ { next }                                            # Skip usually malformed xmux param
            /extra/ { next }
            /type=tcp/ && /sec(urity|ure)=none/ { next }               # Skip type=tcp + security=none (VULNERABLE), order-agnostic
            /sec(urity|ure)=none/ && !/type=xhttp/ { next }            # Skip secure=none without type=xhttp
            { print }                                                  # Output valid lines
            ' "$file" >> WHITE_LIST_PROXY_COLLECTION.txt
        done

        echo "Results saved to WHITE_LIST_PROXY_COLLECTION.txt"

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add WHITE_LIST_PROXY_COLLECTION.txt
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update WHITE_LIST_PROXY_COLLECTION.txt"
          git push
        fi
