name: Update Proxy List

on:
  schedule:
    - cron: '12 */5 * * *'  # Every 5 hours
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    # Sources are read from source-list.txt in the repository (ignore lines starting with '#')

    steps:
    - name: Checkout this repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true
        fetch-depth: 0

    - name: Sync with remote main
      run: |
        set -euo pipefail
        # Fetch latest main and reset working tree to match remote
        git fetch --prune origin main
        git checkout --force main || git checkout -B main
        git reset --hard origin/main

    - name: Fetch URL sources into input/
      run: |
        set -euo pipefail
        rm -rf input/*
        mkdir -p input

        # Read non-comment lines from `source-list.txt`
        echo "Using source-list.txt"
        mapfile -t lines < <(grep -E '^[[:space:]]*[^#[:space:]]' source-list.txt || true)

        idx=0
        for url in "${lines[@]}"; do
          url=$(echo "$url" | tr -d '\r' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')
          if [ -z "$url" ]; then
            continue
          fi

          idx=$((idx+1))
          out="input/${idx}.txt"

          echo "Downloading $url -> $out"
          if curl -fsSL "$url" -o "$out"; then
            echo "Saved $out"
          else
            echo "Warning: failed to download $url"
            rm -f "$out" || true
          fi
        done

    - name: Process and filter files
      run: |
        # Clear output file if it exists
        > WHITE_LIST_PROXY_COLLECTION.txt

        # Process each file and filter content
        for file in input/*.txt; do
            echo "Processing $file..."
            awk '
            /^(ss|socks):\/\// { next }                                 # remove SS
            /xtls-rprx-vision-udp443/ { next }                          # Skip malformed generated links
            /Russia|RU|%F0%9F%87%B7%F0%9F%87%BA%20|Россия/ { next }                             # Filter our Russian servers by a key name
            /xmux/ { next }                                            # Skip usually malformed xmux param
            /extra/ { next }
            /type=tcp/ && /sec(urity|ure)=none/ { next }               # Skip type=tcp + security=none (VULNERABLE), order-agnostic
            /sec(urity|ure)=none/ && !/type=xhttp/ { next }            # Skip secure=none without type=xhttp
            { print }                                                  # Output valid lines
            ' "$file" >> WHITE_LIST_PROXY_COLLECTION.txt
        done

        # Remove duplicate lines while preserving first occurrence order
        awk '!seen[$0]++' WHITE_LIST_PROXY_COLLECTION.txt > WHITE_LIST_PROXY_COLLECTION.tmp || true
        mv WHITE_LIST_PROXY_COLLECTION.tmp WHITE_LIST_PROXY_COLLECTION.txt || true

        echo "Lines & filename:" $(wc -l WHITE_LIST_PROXY_COLLECTION.txt)

    - name: Extract hysteria2 entries
      run: |
        set -euo pipefail
        tmp=$(mktemp)
        new=$(mktemp)
        awk 'BEGIN { IGNORECASE = 0 } /^(hysteria2|hy2):\/\// { print }' WHITE_LIST_PROXY_COLLECTION.txt > "$new"
        if [ -s "$new" ]; then
          now=$(date '+%Y-%m-%d %H:%M:%S')
          count=$(wc -l < "$new" | tr -d '[:space:]')
          printf '# %s (%s keys added)\n' "$now" "$count" > "$tmp"
          cat "$new" >> "$tmp"
          printf '\n' >> "$tmp"
        fi
        if [ -f HYSTERIA2.txt ]; then
          cat HYSTERIA2.txt >> "$tmp"
        fi
        awk '!seen[$0]++' "$tmp" > HYSTERIA2.txt || true
        rm -f "$tmp" "$new"
        echo "Extracted hysteria2 lines:" $(wc -l < HYSTERIA2.txt)

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add WHITE_LIST_PROXY_COLLECTION.txt HYSTERIA2.txt
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Update the lists"

          # Attempt push with simple retry: on failure fetch+merge (prefer remote) and retry
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt"
              break
            else
              echo "Push failed on attempt $attempt, fetching and merging remote..."
              git fetch origin main
              git merge --no-edit -X theirs origin/main || true
              sleep 1
            fi
          done
        fi
